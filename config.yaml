name: "SyncLyrics (UDP)"
version: "1.0.0"
slug: synclyrics_udp
description: "Real-time synced lyrics display with UDP audio input for fingerprinting"
url: "https://github.com/baileyboy0304/SyncLyrics"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
host_network: true
map:
  - addon_config:rw
init: false
options:
  spotify_client_id: ""
  spotify_client_secret: ""
  spotify_redirect_uri: ""
  spotify_lyrics_api_url: ""
  lastfm_api_key: ""
  fanart_tv_api_key: ""
  audiodb_api_key: ""
  server_port: 9014
  spotify_token_cache: "/config/.spotify_cache"
  debug_mode: false
  log_level: "INFO"
  spotify_polling_fast: 2
  spotify_polling_slow: 6
  https_enabled: true
  https_port: 9015
  music_assistant_url: ""
  udp_audio_enabled: true
  udp_audio_port: 6056
  udp_audio_sample_rate: 16000
schema:
  spotify_client_id: str
  spotify_client_secret: str
  spotify_redirect_uri: str?
  spotify_lyrics_api_url: str?
  lastfm_api_key: str?
  fanart_tv_api_key: str?
  audiodb_api_key: str?
  server_port: port
  spotify_token_cache: str
  debug_mode: bool
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  spotify_polling_fast: "int(1,60)"
  spotify_polling_slow: "int(1,60)"
  https_enabled: bool
  https_port: port
  music_assistant_url: str?
  udp_audio_enabled: bool
  udp_audio_port: port
  udp_audio_sample_rate: "int(8000,48000)"
